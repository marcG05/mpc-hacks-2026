version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: api
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - api

  engine:
    build:
      context: ./python
      dockerfile: Dockerfile.dev
    container_name: engine
    volumes:
      - ./python:/app